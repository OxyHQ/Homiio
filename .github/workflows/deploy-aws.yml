# Reusable AWS deploy workflow — copy to each repo as .github/workflows/deploy-aws.yml
# and substitute homiio (ecs service + ecr repo name) and packages/backend/Dockerfile (path).
name: Deploy to AWS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 237343248947.dkr.ecr.us-west-2.amazonaws.com
  APP: homiio
  CLUSTER: oxy-cluster
  DOCKERFILE: packages/backend/Dockerfile

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::237343248947:role/oxy-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync GitHub secrets -> SSM (GitHub is the source of truth)
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          SHARED="AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY REDIS_URL LIVEKIT_API_KEY LIVEKIT_API_SECRET"
          echo "$SECRETS_JSON" | jq -r 'to_entries[] | select((.key|ascii_upcase) as $k | ($k=="GITHUB_TOKEN" or ($k|startswith("ACTIONS_")))|not) | [.key,.value]|@tsv' | \
          while IFS=$'\t' read -r k v; do
            [ -z "$k" ] && continue
            if [ -z "$v" ] || [ "$v" = "-" ]; then
              echo "::warning::skip empty/placeholder secret $k; SSM unchanged"
              continue
            fi
            if [ "$k" = "REDIS_URL" ] && [ "$AWS_REGION" = "us-west-2" ] && ! printf '%s' "$v" | grep -q '\.usw2\.cache\.amazonaws\.com'; then
              echo "::warning::skip REDIS_URL because it does not point at the us-west-2 Valkey endpoint; SSM unchanged"
              continue
            fi
            case " $SHARED " in *" $k "*) path="/oxy/_shared/$k";; *) path="/oxy/$APP/$k";; esac
            aws ssm put-parameter --name "$path" --value "$v" --type SecureString --overwrite >/dev/null && echo "synced -> $path"
          done

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push (linux/arm64)
        run: |
          IMG=$ECR_REGISTRY/oxy/$APP
          docker build -f "$DOCKERFILE" -t "$IMG:${{ github.sha }}" -t "$IMG:latest" .
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"

      - name: Deploy to ECS (API + listing worker; rolling)
        run: |
          deploy_one() {
            local svc="$1"
            local STATUS
            STATUS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$svc" --query 'services[0].status' --output text 2>/dev/null || echo NONE)
            if [ "$STATUS" = "ACTIVE" ]; then
              aws ecs update-service --cluster "$CLUSTER" --service "$svc" --force-new-deployment >/dev/null
              echo "redeploying $svc"
            else
              echo "ECS service $svc not created yet — image is in ECR, skipping $svc"
            fi
          }
          deploy_one "$APP"
          deploy_one "${APP}-worker"
          # Wait on whichever services exist so CI fails if a rollout breaks.
          WAIT=()
          for svc in "$APP" "${APP}-worker"; do
            STATUS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$svc" --query 'services[0].status' --output text 2>/dev/null || echo NONE)
            if [ "$STATUS" = "ACTIVE" ]; then
              WAIT+=("$svc")
            fi
          done
          if [ "${#WAIT[@]}" -gt 0 ]; then
            aws ecs wait services-stable --cluster "$CLUSTER" --services "${WAIT[@]}"
            echo "deployed: ${WAIT[*]}"
          fi
